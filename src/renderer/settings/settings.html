<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪳 蟑螂提醒设置</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <div class="container">
        <h1>🪳 蟑螂提醒</h1>
        <p class="subtitle">定时休息，保护健康！</p>

        <section class="section">
            <h2>⏱ 计时器</h2>
            <div class="form-group">
                <label for="interval">休息间隔</label>
                <div class="slider-row">
                    <input type="range" id="interval" min="1" max="120" step="1">
                    <span class="value-display" id="interval-val">25 分钟</span>
                </div>
            </div>
            <div class="form-group">
                <label for="duration">显示时长</label>
                <div class="slider-row">
                    <input type="range" id="duration" min="3" max="120" step="1">
                    <span class="value-display" id="duration-val">15 秒</span>
                </div>
            </div>
            <div class="form-group">
                <label for="count">蟑螂数量</label>
                <div class="slider-row">
                    <input type="range" id="count" min="1" max="50" step="1">
                    <span class="value-display" id="count-val">3</span>
                </div>
            </div>
        </section>

        <section class="section">
            <h2>🎨 动画</h2>
            <div class="form-group">
                <label for="size">蟑螂大小</label>
                <div class="slider-row">
                    <input type="range" id="size" min="10" max="80" step="1">
                    <span class="value-display" id="size-val">35%</span>
                </div>
            </div>
            <div class="form-group">
                <label for="speed">移动速度</label>
                <div class="slider-row">
                    <input type="range" id="speed" min="5" max="50" step="0.5">
                    <span class="value-display" id="speed-val">13.5%</span>
                </div>
            </div>
            <div class="form-group">
                <label for="fastProb">快速蟑螂概率</label>
                <div class="slider-row">
                    <input type="range" id="fastProb" min="0" max="100" step="5">
                    <span class="value-display" id="fastProb-val">65%</span>
                </div>
            </div>
        </section>

        <section class="section">
            <h2>⚙ 行为</h2>
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" id="autoStart">
                    <span>启动应用时自动开启计时</span>
                </label>
            </div>
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" id="launchAtLogin">
                    <span>开机自启动</span>
                </label>
            </div>
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" id="showNotifications">
                    <span>显示系统通知</span>
                </label>
            </div>
        </section>

        <div class="actions">
            <button class="btn btn-test" id="btn-test">🪳 立即休息 (召唤蟑螂)</button>
            <button class="btn btn-pause" id="btn-pause">⏸ 暂停计时</button>
        </div>

        <div class="status" id="status">
            <span class="status-dot"></span>
            <span id="status-text">正在加载...</span>
        </div>

        <div class="save-row">
            <button class="btn btn-save" id="btn-save">保存设置</button>
        </div>
    </div>
    <script src="settings.js"></script>
</body>
</html>
